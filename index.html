    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            color: #ff0000;
            font-size: 24px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px red;
        }
        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #111;
            border: 1px solid #ff0000;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #ff4444;
            box-shadow: 0 0 10px red;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #8b0000, #ff0000);
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px red;
        }
    </style>
